# ==============================================================================
# nginx default.conf — LexFlow Reverse Proxy (Docker)
#
# Routes:
#   /               → lexflow-web:3000    (Next.js frontend)
#   /backend-health → lexflow-trust:4000  (backend health — direct)
#   /api/trust/     → lexflow-trust:4000  (trust service API)
#
# Uses Docker's embedded DNS (127.0.0.11) for service discovery.
#
# OWNER: Architect Agent (GOV-008 §3.4)
# REF: SPR-002-ARCH D-004
# ==============================================================================

# Use Docker's embedded DNS resolver
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Backend health (direct access for monitoring) ---
    location = /backend-health {
        set $backend lexflow-trust;
        proxy_pass http://$backend:4000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Trust Service API ---
    location /api/trust/ {
        set $backend lexflow-trust;
        proxy_pass http://$backend:4000/api/trust/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # --- Everything else → Frontend ---
    location / {
        set $frontend lexflow-web;
        proxy_pass http://$frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-ID $request_id;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Static file caching ---
    location /_next/static/ {
        set $frontend lexflow-web;
        proxy_pass http://$frontend:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Request size limit (file uploads) ---
    client_max_body_size 25M;
}
