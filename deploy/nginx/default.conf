# ==============================================================================
# nginx default.conf — LexFlow Reverse Proxy
#
# Routes:
#   /             → lexflow-web:3000    (Next.js frontend)
#   /health       → lexflow-trust:4000  (backend health — direct)
#   /api/trust/   → lexflow-trust:4000  (trust service API)
#
# OWNER: Architect Agent (GOV-008 §3.4)
# REF: SPR-002-ARCH D-004
# ==============================================================================

upstream frontend {
    server lexflow-web:3000;
}

upstream backend {
    server lexflow-trust:4000;
}

server {
    listen 80;
    server_name _;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Backend health (direct access for monitoring) ---
    location = /backend-health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Trust Service API ---
    location /api/trust/ {
        proxy_pass http://backend/api/trust/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-ID $request_id;

        # Timeouts for trust operations (some are slow)
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # --- Everything else → Frontend ---
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-ID $request_id;

        # WebSocket support (Next.js HMR in dev, but good to have)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Static file caching ---
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Request size limit (file uploads) ---
    client_max_body_size 25M;
}
